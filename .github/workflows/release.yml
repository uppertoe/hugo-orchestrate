name: Publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    # Weekly rebuild so base-image and Go toolchain security fixes are picked
    # up even when no code changes; the digest pin on the server repo follows.
    - cron: "20 17 * * 0" # Sun 17:20 UTC (Mon 03:20 AEST)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Publish gate: same checks as ci.yml, run here so a red suite blocks the
  # push (ci.yml alone never gated publishing — the workflows are independent).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race ./...

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Build once and LOAD into the runner's docker so the image is booted
      # before anything is pushed.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          load: true
          tags: orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # /healthz is always-200 by design; the dummy site's clone fails in the
      # background without affecting it — this proves the binary starts, loads
      # config and serves, not that builds succeed.
      - name: Smoke test — image boots and serves /healthz
        run: |
          set -e
          cat > /tmp/ci-sites.yaml <<'YAML'
          sites:
            - slug: smoke
              repo: https://example.invalid/smoke.git
          YAML
          docker run -d --name orch-smoke -p 8899:8080 \
            -v /tmp/ci-sites.yaml:/config/sites.yaml:ro orchestrator:ci
          code=000
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8899/healthz || true)
            [ "$code" = "200" ] && break
            sleep 1
          done
          echo "GET /healthz -> $code (after ${i}s)"
          docker logs orch-smoke || true
          docker rm -f orch-smoke >/dev/null 2>&1 || true
          if [ "$code" != "200" ]; then
            echo "::error::boot smoke failed — image does not serve /healthz"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
