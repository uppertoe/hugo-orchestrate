# Standalone local stack for trying the orchestrator without a
# server-instance-template VPS: builds the image from source and runs a Caddy
# that serves the published output over plain HTTP on :8088.
#
#   docker compose -f deploy/docker-compose.local.yml up --build
#   curl http://localhost:8080/healthz
#   open http://localhost:8088/docs/
---
services:
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    user: "65532:65532"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs: [/tmp]
    env_file:
      - path: ./apps/orchestrator/.env
        required: false
    volumes:
      - static:/srv/static
      - ./apps/orchestrator/sites.yaml:/config/sites.yaml:ro
    ports:
      - "8080:8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    command: caddy file-server --listen :80 --root /srv/www --browse
    volumes:
      - static:/srv:ro
    ports:
      - "8088:80"

volumes:
  static:
